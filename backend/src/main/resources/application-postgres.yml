spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urban_agent}
    username: ${DB_USERNAME:urban_agent}
    password: ${DB_PASSWORD:urban_agent}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/postgresql-migration
  h2:
    console:
      enabled: false

management:
  tracing:
    sampling:
      probability: 1.0
